# Substrate Eval Framework — Labeled Outcome Corpus
# Story 77-2: Curate the labeled outcome corpus
#
# Provenance:
#   census_date:        2026-05-24
#   source_repos:
#     - /home/jplanow/code/jplanow/substrate (main Dolt state + run manifests)
#   curation_rationale: >
#     Selected from 139 automated candidates (from 212 run manifests × Dolt
#     story_metrics). Filtered to cases where (a) the run_id exists in both
#     Dolt story_metrics AND .substrate/runs/<id>.json with non-"running" status,
#     and (b) the result class is unambiguous (non-pending, non-unknown).
#     All six result classes covered with ≥5 entries each.
#     Obs_*-cited false-escalation cases (5) document known bugs from Epic 40–41;
#     their expect.result_class is the CORRECT class, not the recorded escalation.
#     These will fail the grader's match check by design — they represent ground
#     truth for regression detection after obs_026 fixes ship.
#   pollution_caveat: >
#     Runs with manifest status "?" have an unrecognized or legacy run_status field;
#     excluded from this corpus. Runs with manifest status "failed" are structurally
#     complete (not "running") and are valid corpus sources — the run-level failure
#     does not invalidate individual story outcomes. Story-level result_class is
#     the authoritative signal (from story_metrics.result), not the run status.
#     Do NOT curate entries from runs with current-run-id pointing to active runs.

corpus_version: 1
census_date: "2026-05-24"
source_repos:
  - /home/jplanow/code/jplanow/substrate
curation_rationale: >
  Selected from 139 automated candidates across 212 run manifests and the Dolt
  story_metrics table. Filtered to cases where the run_id has a non-running manifest
  AND a confirmed story_metrics.result value. Coverage: ≥5 entries per result class.
  False-escalation cases (obs_026) document the ~28% interface-extraction escalation
  rate under default --max-review-cycles 2; expect.result_class = the correct class.
pollution_caveat: >
  Runs with manifest status "failed" are valid corpus sources — run-level failure does
  not invalidate individual story outcome records. Entries from manifests with status
  "?" (legacy format, no run_status field) are excluded. Do not add entries from
  currently-running manifests (run_status = "running").

