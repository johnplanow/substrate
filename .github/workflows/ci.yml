name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Story 60-12 (workflow ordering fix): align cross-package versions and
      # regenerate the lockfile before `npm ci` so a chore version-bump
      # commit that forgot `npm run version:sync && npm install` doesn't
      # fail CI with cryptic EUSAGE. See publish.yml for the full incident
      # description (strata 1-12 ship cycle, 2026-04-26).
      - name: Sync workspace package versions to root
        run: npm run version:sync

      - name: Regenerate package-lock.json from synced package.json files
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Install dependencies
        run: npm ci

      # Install Dolt for the transaction-safety integration test
      # (packages/core/src/persistence/dolt-adapter-transaction.test.ts AC3 —
      # gated on DOLT_INTEGRATION_TEST=1). The test verifies CLI-mode
      # transaction commits are visible to a fresh Dolt CLI process —
      # critical for the production path where substrate state survives
      # across pipeline runs. Skipping it silently since 2026-04-08 was
      # tech debt; v0.20.73 enables it in CI.
      - name: Install Dolt (for integration test)
        run: brew install dolt

      - name: Build
        run: npm run build

      - name: Circular dependency check
        run: npm run check:circular

      - name: Type check (gate)
        run: npm run typecheck:gate

      - name: Type check (strict)
        run: npm run typecheck
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        env:
          DOLT_INTEGRATION_TEST: '1'
        run: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
