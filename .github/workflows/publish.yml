name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish npm Package
    runs-on: macos-latest

    permissions:
      contents: read
      id-token: write

    env:
      # Opt actions/checkout@v4 and actions/setup-node@v4 into Node.js 24.
      # Node.js 20 is deprecated on GitHub Actions (forced removal Sep 2026);
      # upstream v5 releases of these actions are not yet available. Opting
      # in early keeps the publish workflow on a supported runtime.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm for OIDC trusted publishing (requires >= 11.5.1)
        run: npm install -g npm@11.5.1

      # Story 60-12 (workflow ordering fix): version:sync MUST run before
      # npm ci. The strata 1-12 ship cycle (2026-04-26) burned tags
      # v0.20.24/25/26 because chore version-bump commits only updated each
      # package.json's `version` field — cross-package `dependencies`
      # references in packages/factory and packages/sdlc still pinned the
      # prior `@substrate-ai/core: 0.20.23`, and package-lock.json was
      # never regenerated. `npm ci` then failed in <20s with
      # EUSAGE / "Missing: @substrate-ai/core@0.20.23 from lock file".
      # Pre-syncing aligns workspace package.json files; --package-lock-only
      # regenerates the lock from the synced state without installing;
      # `npm ci` then has a self-consistent lock to install from.
      - name: Sync workspace package versions to root
        run: npm run version:sync

      - name: Regenerate package-lock.json from synced package.json files
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Install dependencies
        run: npm ci

      # Install Dolt for the transaction-safety integration test (see ci.yml)
      - name: Install Dolt (for integration test)
        run: brew install dolt

      - name: Build
        run: npm run build

      - name: Run tests
        env:
          DOLT_INTEGRATION_TEST: '1'
        run: npx vitest run

      - name: Dry run publish — substrate-ai (root)
        run: npm publish --dry-run

      - name: Dry run publish — @substrate-ai/core
        working-directory: packages/core
        run: |
          if [ -d dist ]; then
            npm publish --dry-run
          else
            echo "packages/core/dist missing — skipping dry-run"
          fi

      - name: Dry run publish — @substrate-ai/sdlc
        working-directory: packages/sdlc
        run: |
          if [ -d dist ]; then
            npm publish --dry-run
          else
            echo "packages/sdlc/dist missing — skipping dry-run"
          fi

      - name: Dry run publish — @substrate-ai/factory
        working-directory: packages/factory
        run: |
          if [ -d dist ]; then
            npm publish --dry-run
          else
            echo "packages/factory/dist missing — skipping dry-run"
          fi

      - name: Publish substrate-ai to npm
        run: npm publish --provenance --access public

      - name: Publish @substrate-ai/core to npm
        working-directory: packages/core
        run: |
          if [ -d dist ]; then
            npm publish --provenance --access public
          else
            echo "packages/core/dist missing — skipping publish"
          fi

      - name: Publish @substrate-ai/sdlc to npm
        working-directory: packages/sdlc
        run: |
          if [ -d dist ]; then
            npm publish --provenance --access public
          else
            echo "packages/sdlc/dist missing — skipping publish"
          fi

      - name: Publish @substrate-ai/factory to npm
        working-directory: packages/factory
        run: |
          if [ -d dist ]; then
            npm publish --provenance --access public
          else
            echo "packages/factory/dist missing — skipping publish"
          fi
