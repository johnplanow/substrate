# Per-phase pass thresholds (V1b-3)
#
# Derived from first meta-eval calibration (2026-04-12):
#   analysis:       good=0.775  bad=0.240  margin=0.535
#   planning:       good=0.916  bad=0.030  margin=0.886
#   solutioning:    good=0.925  bad=0.170  margin=0.755
#   implementation: good=0.685  bad=0.470  margin=0.215
#
# Implementation gets a lower threshold because its good score (0.685)
# naturally lands below 0.70 due to real-world partial AC completion.

default: 0.7
regression: 0.05
phases:
  analysis: 0.70
  planning: 0.70
  solutioning: 0.70
  implementation: 0.60

# Self-eval at phase transitions (Epic 55-3)
# Disabled by default — opt-in per phase. Self-eval thresholds can differ
# from post-run eval thresholds (a phase might pass self-eval at 0.60 but
# need 0.70 in the post-run report).
#
# self_eval:
#   analysis:
#     enabled: true
#     threshold: 0.65
#     max_retries: 1
#     on_fail: escalate
#   planning:
#     enabled: true
#     threshold: 0.65
#     on_fail: escalate
