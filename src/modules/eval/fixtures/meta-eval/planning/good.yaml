name: planning-good-cli-task-tracker
description: Strong PRD output — measurable FRs, concrete NFRs, justified tech, explicit scope
phase: planning
notes: |
  Hand-built reference for a high-quality planning (PRD) output. Should score high on all
  four planning rubric dimensions: requirement_measurability, nfr_coverage,
  tech_stack_justification, scope_boundaries.
output: |
  functional-requirements: FR1 — The CLI must support `tt add "<title>" [--priority p] [--due YYYY-MM-DD]` and return exit code 0 on success, exit 2 on invalid date format. Acceptance: a test harness can add 100 tasks in under 5 seconds and reread them back identically. FR2 — `tt list [--status open|done] [--priority h|m|l] [--search <term>]` returns a deterministically ordered list sorted by priority desc, then due date asc. Acceptance: identical stored data produces identical list output across runs. FR3 — `tt complete <id>` and `tt delete <id>` mutate state and return exit 0; exit 3 if id not found. Acceptance: after a mutation, the next `tt list` reflects the change without a manual reload step. FR4 — Data is persisted to `$XDG_DATA_HOME/tt/tasks.json` (or `~/.local/share/tt/tasks.json` fallback). Acceptance: the file is valid UTF-8 JSON parseable by `jq` without warnings.
  non-functional-requirements: NFR1 — Cold-start latency from command invocation to first output must not exceed 80ms at the 95th percentile on an M1 MacBook Air with 1000 tasks in the store. Measurement: hyperfine over 200 runs. NFR2 — Binary size must not exceed 8 MB stripped. Measurement: `ls -l` on the release artifact in CI. NFR3 — No network syscalls at runtime. Measurement: verified via `strace -e trace=network` on Linux CI. NFR4 — Memory residency under 15 MB RSS at peak during a 1000-task list operation. Measurement: `/usr/bin/time -v`.
  tech-stack: Language — Rust 1.75+. Justification: zero-runtime, sub-10ms startup when statically linked, strong stdlib for JSON and filesystem, single-binary distribution fits NFR2. Serialization — serde_json. Justification: mature, no-alloc options for small payloads, aligns with NFR1 cold-start target. CLI parsing — clap v4 with derive. Justification: compile-time validation of flag combinations, auto-generated help fits "discoverable without docs" design goal. Testing — cargo test plus integration tests in `tests/` using assert_cmd for binary-level assertions. Justification: matches the acceptance approach (exit codes, output equality) without a separate test harness.
  out-of-scope: Network sync, shared task lists, web UI, iOS/Android apps, reminder daemons, plugin architecture, theming. Each was considered and excluded: sync and shared lists contradict the zero-network constraint; UI layers contradict the terminal-first target; daemons violate the single-binary NFR; plugins add attack surface disproportionate to the user base for v1. Revisit list maintained at docs/revisit.md with trigger conditions.
