name: solutioning-bad-cli-task-tracker
description: Subtle-bad solutioning — structure-matched, plausible-sounding, fails all four rubric dimensions
phase: solutioning
notes: |
  G8.a-part-2 subtle bad variant (2026-04-11). Structurally matched to solutioning/good.yaml
  (five YAML code-fenced blocks: three architecture steps, one epics step, one stories step,
  each separated by <!-- step-boundary --> markers). The degradation is semantic.

  Length asymmetry note: solutioning/good.yaml is ~46KB of real captured output, so a fully
  length-matched bad would require ~46KB of hand-crafted degraded content. This bad variant
  is ~15KB — structurally parallel but with shorter decision and story lists. Meta-eval
  margin on this phase may be weakly biased toward the (longer) good variant; the length
  asymmetry is acknowledged and should be narrowed during the first real calibration pass
  (`npm run test:meta-eval` with a real grader).

  Per-dimension degradation:

  - architecture_rationale: every architecture_decision has a `rationale` field present
    (structural parity with good), but the rationale is tautological ("it's the standard",
    "makes sense for this project", "industry best practice") rather than explaining the
    specific tradeoff or requirement it satisfies. The judge should recognize the absence
    of substantive reasoning.
  - story_decomposition (G6-rewritten — asks AC lists + named modules): stories have titles
    and descriptions but EITHER missing acceptance_criteria entirely OR an acceptance_criteria
    list that restates the title in bullet form without naming any module, file, or interface.
    Structurally the field is present but semantically empty.
  - fr_coverage: epics still have a fr_coverage field for structural parity, but the
    coverage is incomplete — several epics map to the same two placeholder FR refs
    ("frs-0", "frs-1"), leaving the rest of the planning FRs unmapped.
  - dependency_ordering: at least one story description references a module defined in
    a later story (forward reference), and the story ordering does not follow a logical
    dependency chain (utility modules appear after the commands that use them).
