  ```yaml
  result: success
  architecture_decisions:
    - category: "patterns"
      key: "package-organization"
      value: "cmd/{add,list,complete,delete,version}.go; internal/task/{task.go,validate.go}; internal/store/{store.go,json_store.go,lock.go}; internal/format/table.go; main.go calls cmd.Execute()"
      rationale: "One file per concern within each package keeps navigation predictable. Cobra command definitions live exclusively in cmd/; no business logic crosses into cmd/. internal/ packages are imported only by cmd/ and each other, enforcing the layered architecture."

    - category: "patterns"
      key: "store-interface"
      value: "Define a Store interface in internal/store/store.go with Load() ([]task.Task, error) and Save([]task.Task) error; JSONStore struct implements it; cmd/ receives a Store via constructor injection"
      rationale: "Interface-based dependency injection lets cmd/ tests substitute a fake or in-memory store without touching the filesystem. The interface is defined in internal/store/ (not cmd/) to keep the dependency direction pointing inward. All file-locking, atomic-write, and permission logic lives inside JSONStore, invisible to callers."

    - category: "patterns"
      key: "command-wiring"
      value: "Each command file exports a NewXxxCmd(store Store) *cobra.Command factory; cmd/root.go calls AddCommand with the result of each factory; main.go calls cmd.NewRootCmd(store).Execute()"
      rationale: "Factory functions decouple command construction from global state. Passing the store through constructors (not package-level vars) enables parallel testing of multiple commands. root.go is the sole place where the real JSONStore is instantiated, keeping instantiation logic in one place."

    - category: "patterns"
      key: "error-propagation"
      value: "All internal functions return (value, error); wrap errors with fmt.Errorf("<operation>: %w", err); cobra RunE returns the wrapped error; root.go PersistentPostRunE maps error types to exit codes and prints user-facing messages to stderr"
      rationale: "Wrapping with %w preserves the error chain for errors.Is/As checks and keeps diagnostic context without exposing stack traces. A single root-level error renderer ensures consistent message formatting (e.g., 'task not found: abc12345 — run `tasks list` to see valid IDs') and centralized exit-code mapping (user errors → 1, system errors → 2)."

    - category: "patterns"
      key: "sentinel-errors"
      value: "Declare package-level sentinel errors in internal/task/ (var ErrTaskNotFound = errors.New("task not found"), ErrDuplicateID, etc.); store and cmd layers use errors.Is to branch on them"
      rationale: "Sentinel errors provide a stable, type-safe mechanism for callers to distinguish recoverable user errors (task not found → exit 1) from unexpected system failures (I/O error → exit 2) without string matching. Defined in the domain package so all layers share the same canonical values."

    - category: "patterns"
      key: "validation-layer"
      value: "All input validation lives in internal/task/validate.go as pure functions (ValidateTitle, ValidateDescription, ValidatePriority, ValidateDueDate) returning descriptive errors; cmd/ calls validate before mutating store"
      rationale: "Centralizing validation in the domain package prevents duplicate checks across commands and makes validation logic independently unit-testable without cobra or file I/O. Validation functions are pure (no side effects), enabling table-driven tests with zero setup. Commands call validate before acquiring the file lock to fail fast."

    - category: "patterns"
      key: "task-mutation-pattern"
      value: "Commands follow a strict read-validate-mutate-save sequence: (1) store.Load(), (2) validate inputs, (3) apply in-memory mutation, (4) store.Save(tasks); no partial saves or multi-step writes"
      rationale: "The load-mutate-save pattern keeps the store interface simple (no patch or upsert methods) and guarantees the JSON file always reflects a complete consistent snapshot. Combined with atomic rename and flock, this prevents partial writes. The pattern is uniform across add, complete, and delete commands, reducing cognitive overhead."

    - category: "patterns"
      key: "file-lock-pattern"
      value: "internal/store/lock.go provides withExclusiveLock(path string, fn func() error) error that opens the file, calls syscall.Flock(LOCK_EX), defers LOCK_UN, then invokes fn; JSONStore wraps every Load+Save pair in withExclusiveLock"
      rationale: "Encapsulating flock in a single higher-order function prevents callers from forgetting to unlock or from holding the lock across unrelated work. The lock is acquired on the tasks.json file descriptor itself (same mount as the temp file used for atomic rename), ensuring POSIX rename atomicity is not undermined by concurrent access."

    - category: "patterns"
      key: "atomic-write-pattern"
      value: "JSONStore.Save marshals JSON to a temp file (os.CreateTemp in same directory, mode 0600), syncs with f.Sync(), closes, then calls os.Rename(tmp, target); on any error the temp file is removed before returning"
      rationale: "Same-directory temp file guarantees same filesystem mount, making os.Rename atomic on POSIX. f.Sync() flushes kernel buffers before rename so a crash after rename leaves a complete file. Cleanup on error prevents orphaned temp files. This implements the NFR for crash-safe atomic writes with pure stdlib."

    - category: "patterns"
      key: "naming-conventions"
      value: "Types: PascalCase (Task, JSONStore, Priority); functions/methods: camelCase (validateTitle, newRootCmd); constants/enums: PascalCase (PriorityHigh, PriorityMedium, PriorityLow); test files: <file>_test.go in same package (white-box) or _test suffix package for integration"
      rationale: "Standard Go idiom. Exported identifiers are PascalCase; unexported are camelCase. Priority constants as typed string enum (type Priority string; const PriorityHigh Priority = "high") allows exhaustive switch checking and JSON round-trip without a separate mapping table."

    - category: "patterns"
      key: "import-organization"
      value: "Three import groups separated by blank lines: (1) stdlib packages, (2) third-party modules (cobra, uuid), (3) internal packages (internal/task, internal/store, internal/format); enforced by goimports"
      rationale: "goimports grouping is the Go community standard and is enforced automatically by most editors and CI lint steps. Keeping internal imports in a distinct group makes it immediately visible when a package pulls in a new external dependency, aiding code review and dependency auditing."

    - category: "patterns"
      key: "table-driven-tests"
      value: "All validation and domain logic tests use []struct{ name, input, wantErr string } tables with t.Run(tc.name, ...) and t.Parallel() on each sub-test; store tests use t.TempDir() for isolated scratch directories"
      rationale: "Table-driven tests minimize boilerplate while maximizing case coverage — adding an edge case is a one-line struct literal. t.Parallel() on sub-tests maximizes CPU utilization in CI. t.TempDir() isolation prevents inter-test file system pollution and is automatically cleaned up, satisfying the test-isolation architecture decision."

    - category: "patterns"
      key: "output-formatting-pattern"
      value: "internal/format/table.go exposes PrintTasks(w io.Writer, tasks []task.Task) using text/tabwriter with tab-separated columns (ID, TITLE, PRIORITY, DUE, STATUS); mutation commands print a single confirmation line to w io.Writer; all cmd/ code passes os.Stdout explicitly"
      rationale: "Accepting io.Writer instead of writing directly to os.Stdout makes output testable without capturing global stdout. tabwriter alignment is computed once per Print call — no per-row formatting logic in cmd/. Single-line mutation confirmations (Added task abc12345) keep output parseable by scripts."

    - category: "patterns"
      key: "verbose-flag-pattern"
      value: "Root command defines a --verbose persistent flag stored in a RootFlags struct; cmd/ passes a verboseWriter(verbose bool) io.Writer helper that returns os.Stderr when verbose=true and io.Discard otherwise; internal packages accept an optional io.Writer for diagnostics"
      rationale: "A persistent root flag propagates to all subcommands automatically via cobra. The verboseWriter helper avoids scattered if verbose { fmt.Fprintln(os.Stderr, ...) } blocks. Passing io.Discard (not nil) means diagnostic write calls compile and run safely regardless of the verbose flag, with zero allocation cost."

    - category: "patterns"
      key: "version-embedding"
      value: "main.go declares var (Version = "dev"; Commit = "none"; BuildDate = "unknown"); build Makefile passes -ldflags '-X main.Version=$(VERSION) -X main.Commit=$(COMMIT) -X main.BuildDate=$(DATE)'; NewRootCmd receives these as parameters and wires them to the version subcommand"
      rationale: "Declaring vars in main.go (not a separate package) is the idiomatic Go pattern for ldflags injection. Passing them as parameters to NewRootCmd keeps cmd/ testable with fixed version strings. Default values ('dev', 'none', 'unknown') ensure `go run .` produces a meaningful output without ldflags."
  ```


