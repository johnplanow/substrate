  ```yaml
  result: success
  architecture_decisions:
    - category: "backend"
      key: "system-architecture"
      value: "Single-binary CLI application — no server, no daemon"
      rationale: "Requirements mandate a self-contained binary with zero network calls and local-only storage. A traditional client-server or layered web architecture adds unnecessary complexity and contradicts the offline-first, single-file distribution model."

    - category: "backend"
      key: "language-runtime"
      value: "Go (golang)"
      rationale: "Go cross-compiles to static binaries for macOS and Linux with no runtime dependency. A typical Go CLI binary is 5–12MB, well under the 20MB NFR. The standard library covers atomic file writes, JSON marshaling, and fast I/O without third-party dependencies. Startup time is sub-millisecond, making the 100ms p99 latency target trivially achievable for up to 1000 tasks."

    - category: "backend"
      key: "cli-framework"
      value: "cobra + pflag"
      rationale: "Cobra is the de facto standard for Go CLIs (kubectl, gh, hugo all use it). It provides subcommand routing, flag parsing, help generation, and shell-completion scaffolding with minimal binary size overhead (~2MB). Avoids reinventing argument parsing while keeping the dependency footprint small."

    - category: "backend"
      key: "data-storage"
      value: "Local JSON file (~/.config/tasks/tasks.json or XDG_CONFIG_HOME)"
      rationale: "FRs explicitly require JSON file persistence with no server or network dependency. JSON is human-readable and trivially inspectable/editable by users. For 1000 tasks the file will be well under 1MB; full load-parse-write round-trip stays under 10ms. XDG base dir ensures clean cross-platform placement."

    - category: "backend"
      key: "storage-write-strategy"
      value: "Atomic write: marshal to temp file in same directory, then os.Rename"
      rationale: "NFR explicitly mandates atomic writes to prevent corruption on power failure or process termination. os.Rename is atomic on POSIX filesystems (Linux and macOS) when source and destination share the same mount point. Writing to a temp file in the same directory guarantees same-mount semantics. No external library needed — pure stdlib."

    - category: "backend"
      key: "data-model"
      value: "Flat Task struct with UUID id, title, description, priority enum, dueDate (ISO-8601 string), completed bool, createdAt timestamp, stored in a JSON array"
      rationale: "All required operations (add, list, complete, delete, filter, search, sort) operate on a single entity type. A flat array avoids joins or indexes. UUID v4 IDs are human-friendly for CLI use and avoid sequential-ID conflicts if the file is manually edited. ISO-8601 date strings are readable without deserialization and sort lexicographically."

    - category: "backend"
      key: "task-id-scheme"
      value: "Short UUID (first 8 hex chars of UUID v4)"
      rationale: "Full UUIDs are unwieldy to type on a CLI. Truncating to 8 chars provides 4-billion distinct values — more than sufficient for a personal task list — while remaining easy to copy-paste. Collision probability at 1000 tasks is negligible (< 1 in 200,000)."

    - category: "backend"
      key: "project-structure"
      value: "cmd/ for cobra command definitions; internal/task/ for domain model and business logic; internal/store/ for JSON persistence; internal/format/ for terminal output formatting"
      rationale: "Separating CLI wiring (cmd/), domain logic (internal/task/), persistence (internal/store/), and presentation (internal/format/) enforces single-responsibility and makes each layer independently testable. Go's internal/ convention prevents accidental external import of private packages."

    - category: "crosscutting"
      key: "error-handling"
      value: "Wrap all errors with context using fmt.Errorf('%w') or errors.Join; top-level cobra RunE handlers translate to user-facing messages with corrective hints; never print raw stack traces"
      rationale: "NFR requires user-friendly error messages that identify the failing operation and suggest correction without exposing internals. A centralized error-rendering function in cmd/root.go intercepts all RunE errors and formats them consistently (e.g., 'task not found: abc12345 — run `tasks list` to see valid IDs')."

    - category: "crosscutting"
      key: "output-formatting"
      value: "tabwriter-based table output for list commands; single-line confirmation messages for mutations"
      rationale: "Go's text/tabwriter aligns columns without external dependencies and respects terminal width. It produces the readable terminal-formatted output required by FR-1. Single-line confirmations (e.g., 'Added task abc12345') keep mutation output unambiguous and scriptable."

    - category: "crosscutting"
      key: "testing-strategy"
      value: "Unit tests for internal/task/ and internal/store/ with table-driven tests; integration tests invoking cobra command runners end-to-end against a temp-dir JSON file"
      rationale: "Business logic and persistence are the highest-risk layers and fully unit-testable without process spawning. End-to-end cobra runner tests validate the full command surface (add, list, complete, delete, filter, search) against real flag parsing and real file I/O using t.TempDir(), giving high confidence without slow binary compilation in CI."

    - category: "infrastructure"
      key: "build-and-distribution"
      value: "go build with CGO_ENABLED=0 and GOOS/GOARCH cross-compilation targets (darwin/amd64, darwin/arm64, linux/amd64, linux/arm64); released as GitHub Release assets or Homebrew tap"
      rationale: "CGO_ENABLED=0 produces fully static binaries with no libc dependency, enabling use in minimal Linux containers and SSH environments. Cross-compilation is native in Go toolchain with no Docker or cross-compiler required. GitHub Releases with checksums satisfies the single-binary install-without-package-manager NFR."
  ```


