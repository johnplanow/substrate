name: solutioning-good-cli-task-tracker
description: Strong architecture + story decomposition — rationale, small stories, full FR coverage
phase: solutioning
notes: |
  Hand-built reference for a high-quality solutioning output. Should score high on all
  four solutioning rubric dimensions: architecture_rationale, story_decomposition,
  fr_coverage, dependency_ordering.
output: |
  architecture-decisions: AD1 — Use a single-file JSON store keyed by task id. Rationale: fits NFR3 (no network), NFR4 (small memory), and the single-binary packaging constraint. Alternative considered: embedded SQLite; rejected because it adds 1.5 MB to the binary (violates NFR2) and introduces a concurrency model we don't need for a single-user CLI. AD2 — Load the entire file on each invocation rather than keeping a long-lived daemon. Rationale: aligns with the "no daemon" out-of-scope decision; trades a small cold-start cost for zero running-process overhead. Measured: 1000-task load in ~6ms, well under the 80ms NFR1 budget. AD3 — Use clap derive for CLI parsing. Rationale: compile-time guarantees on flag combinations catch a class of runtime errors at build time; auto-generated help satisfies the "discoverable without docs" goal from planning. AD4 — Store dates as ISO-8601 strings, not epoch seconds. Rationale: supports the "human-readable and manually editable" storage requirement from FR4; the ~5% parse cost is dominated by JSON parse anyway.
  stories: S1 — Scaffold the Rust project with clap and serde_json. Acceptance: `cargo build --release` produces a binary under 8 MB and `tt --help` prints usage. Covers no FRs directly but unblocks everything. Size: ~2 hours. S2 — Implement `tt add` with title, priority, and due-date flags. Acceptance: adds to the JSON store, returns exit 0, date validation returns exit 2. Covers FR1. Depends on S1. Size: ~3 hours. S3 — Implement `tt list` with filters and deterministic ordering. Acceptance: output sorted by priority desc then due asc; filter flags compose; identical store yields identical output. Covers FR2. Depends on S1, S2. Size: ~4 hours. S4 — Implement `tt complete` and `tt delete`. Acceptance: state mutations persist; unknown id returns exit 3. Covers FR3. Depends on S1. Size: ~2 hours. S5 — Wire XDG-compliant storage path with fallback. Acceptance: file lands at $XDG_DATA_HOME/tt/tasks.json; fallback used when unset. Covers FR4. Depends on S1. Size: ~1 hour.
  functional-requirement-mapping: FR1 → S2. FR2 → S3. FR3 → S4. FR4 → S5. All four FRs from planning have an owning story; no story covers a requirement outside the FR list.
  story-dependencies: S1 → (S2, S3, S4, S5). S2 → S3 (list depends on something to list). S3, S4, S5 are parallelizable after their upstream. Topological order: S1, S2, (S3 ∥ S4 ∥ S5). No forward references; no story depends on an uncreated predecessor.
