  result: success
  architecture_decisions:
    - category: "crosscutting"
      key: "authentication-authorization"
      value: "No application-level auth — rely entirely on OS filesystem permissions"
      rationale: "This is a single-user local CLI tool with no network surface. Authentication would add complexity with zero security benefit. Access control is delegated to the OS: tasks.json is created with mode 0600 (owner read/write only) and the config directory with 0700, ensuring other users on the same machine cannot read or modify task data."

    - category: "crosscutting"
      key: "exit-codes"
      value: "Exit 0 for success; exit 1 for user/input errors (bad flags, task not found); exit 2 for system errors (file I/O failure, JSON corruption)"
      rationale: "Distinct exit codes allow shell scripts and CI pipelines to distinguish recoverable user mistakes from infrastructure failures without parsing stderr. Cobra's RunE returns errors that are mapped to these codes in a single root-level PostRunE handler, keeping code mapping centralized."

    - category: "crosscutting"
      key: "stdout-stderr-separation"
      value: "All task data output (tables, confirmations) goes to stdout; all errors, warnings, and --verbose diagnostics go to stderr"
      rationale: "Stdout/stderr separation allows output to be piped or redirected cleanly (e.g., tasks list | grep ...) without mixing error messages into data. This is the POSIX convention and is required for the tool to compose well in shell pipelines."

    - category: "crosscutting"
      key: "logging"
      value: "No log files; a --verbose flag on any command writes diagnostic lines (file path resolved, parse duration, write duration) to stderr at runtime"
      rationale: "A persistent log file is unnecessary overhead for a personal CLI tool and would complicate the single-binary, zero-config distribution model. --verbose satisfies ad-hoc debugging needs without adding log rotation, file location management, or third-party logging libraries."

    - category: "crosscutting"
      key: "input-validation"
      value: "Title: required, max 200 chars; description: optional, max 2000 chars; priority: enum validation (high|medium|low, case-insensitive); due date: ISO-8601 YYYY-MM-DD strict parse; reject ASCII control characters (0x00–0x1F except tab/newline) in all text fields"
      rationale: "Length caps prevent pathological JSON file sizes and terminal rendering issues. Enum validation on priority at ingestion time avoids storing invalid states that would require defensive checks throughout the codebase. Rejecting control characters prevents terminal escape-sequence injection when titles are rendered in tabwriter output."

    - category: "crosscutting"
      key: "file-locking"
      value: "Acquire an advisory exclusive flock (syscall.Flock with LOCK_EX) on the tasks.json file before each read-modify-write cycle; release after os.Rename completes"
      rationale: "If a user opens two terminal tabs and runs concurrent mutations, both could read the same snapshot, apply diverging changes, and the last rename wins — silently losing the first mutation. flock is available on both Linux and macOS (POSIX), adds negligible latency, and is released automatically if the process dies, avoiding deadlock."

    - category: "crosscutting"
      key: "file-permissions"
      value: "Config directory created with os.MkdirAll mode 0700; tasks.json written via os.OpenFile with mode 0600; temp file for atomic write also created with 0600"
      rationale: "0600/0700 prevents other local users from reading task data (which may contain sensitive project or personal context). These permissions are set at creation time so they are never briefly world-readable, unlike a chmod-after-create approach."

    - category: "crosscutting"
      key: "testing-strategy-detail"
      value: "Go's stdlib testing package with table-driven tests; 80% line coverage enforced via go test -covermode=atomic -coverprofile; benchmarks in internal/store/ validating read+write round-trip under 10ms for 1000 tasks; no external test framework"
      rationale: "The stdlib testing package requires zero dependencies and is idiomatic Go. Table-driven tests for internal/task/ cover all priority/date/ID validation edge cases with minimal boilerplate. Store benchmarks (BenchmarkLoad1000, BenchmarkSave1000) give regression protection for the 100ms CLI latency NFR without requiring end-to-end process spawning. 80% threshold is achievable while excluding generated or thin-wrapper code."

    - category: "crosscutting"
      key: "test-isolation"
      value: "Each test that touches the filesystem uses t.TempDir() for an isolated scratch directory; no shared global state; store path injected via constructor argument rather than read from environment"
      rationale: "t.TempDir() is automatically cleaned up on test completion, preventing test pollution and making tests safe to run in parallel (t.Parallel()). Constructor injection of the store path (rather than a global or singleton) makes unit tests trivial to wire without environment variable manipulation."

    - category: "crosscutting"
      key: "dependency-management"
      value: "Pin to exactly three third-party modules: github.com/spf13/cobra, github.com/spf13/pflag (cobra transitive dep), github.com/google/uuid; run go mod tidy and go mod verify in CI; no replace directives"
      rationale: "Minimizing the dependency graph reduces binary size, attack surface, and supply-chain risk. google/uuid is the only addition beyond cobra/pflag — it provides cryptographically seeded UUID v4 generation that stdlib math/rand cannot safely replicate. go mod verify in CI detects tampered module cache entries before they reach a release build."

    - category: "infrastructure"
      key: "version-embedding"
      value: "Embed Version, Commit (short SHA), and BuildDate strings via -ldflags '-X main.Version=... -X main.Commit=... -X main.BuildDate=...' at build time; expose via tasks version subcommand and --version flag"
      rationale: "Users filing bug reports need a way to identify the exact binary in use. Embedding at link time avoids a separate version file that could fall out of sync. The version subcommand outputs a machine-readable line (tasks version 1.2.3 commit a1b2c3d built 2026-04-11) usable in support scripts."

    - category: "security"
      key: "json-corruption-recovery"
      value: "On JSON unmarshal failure, emit a clear error identifying the file path and byte offset, suggest manual inspection or restoration from backup, and exit 2 without overwriting the corrupted file"
      rationale: "Silent overwrite of a corrupted tasks.json would destroy user data. Surfacing the exact file path and a hint (e.g., 'tasks.json may be manually edited — check for trailing commas or truncation') lets users recover without data loss. Exiting without write ensures the corrupted file is preserved for inspection."
  ```


