            - "Validation is performed before acquiring the file lock to fail fast"
            - "The store is written atomically so an interrupted add does not leave a partial file"
          priority: "must"

        - key: "1-5"
          title: "List tasks command with tabwriter formatted output"
          description: "Implement cmd/list.go as NewListCmd(store Store). Implement internal/format/table.go exposing PrintTasks(w io.Writer, tasks []task.Task) that uses text/tabwriter to render tab-aligned columns: ID, TITLE, PRIORITY, DUE, STATUS. STATUS shows done for completed tasks and pending for incomplete tasks. Tasks with no due date show a dash in the DUE column. All task data output goes to stdout; errors go to stderr. PrintTasks accepts an io.Writer so output is testable without capturing global stdout."
          acceptance_criteria:
            - "Running the list command prints a header row with columns ID, TITLE, PRIORITY, DUE, and STATUS"
            - "Each task row is tab-aligned using text/tabwriter with consistent column spacing"
            - "Completed tasks show done in the STATUS column and incomplete tasks show pending"
            - "Tasks with no due date show a dash in the DUE column"
            - "Running list with no tasks stored prints only the header row without an error"
            - "Task data output goes to stdout and error messages go to stderr"
            - "PrintTasks accepts an io.Writer parameter making it testable without os.Stdout"
            - "Unit tests verify header row presence and correct column values for multiple tasks"
          priority: "must"

        - key: "1-6"
          title: "Complete and delete task commands"
          description: "Implement cmd/complete.go as NewCompleteCmd(store Store) and cmd/delete.go as NewDeleteCmd(store Store). Both accept one or more task IDs as positional arguments. Complete sets completed to true on each specified task; delete removes each specified task from the list. Both follow the read-validate-mutate-save pattern: load all tasks, verify each ID exists returning ErrTaskNotFound for unknowns, apply the mutation, then save. Print a confirmation line per modified task to stdout. Unknown IDs print to stderr and exit with code 1."
          acceptance_criteria:
            - "Running complete with a valid ID sets the task completed field to true and saves"
            - "Running complete with multiple IDs marks all specified tasks as complete in a single save"
            - "Running complete with an unknown ID prints an error to stderr and exits with code 1"
            - "Running delete with a valid ID removes the task from the stored list and saves"
            - "Running delete with multiple IDs removes all specified tasks in a single save"
            - "Running delete with an unknown ID prints an error to stderr and exits with code 1"
            - "Both commands print a confirmation line to stdout for each successfully modified task"
            - "After completing or deleting, subsequent list output reflects the changes"
            - "Unit tests cover success, not-found, and store error cases for both commands"
          priority: "must"

        - key: "1-7"
          title: "Integration tests and performance validation"
          description: "Write integration tests in cmd/ that invoke cobra command runners end-to-end against a t.TempDir JSON file covering add, list, complete, and delete. Verify that store benchmarks BenchmarkLoad1000 and BenchmarkSave1000 pass their sub-10ms assertions. Enforce 80 percent line coverage across all packages using go test -covermode=atomic. All tests must pass with go test ./... and no test may use a shared global store path."
          acceptance_criteria:
            - "Integration tests invoke add, list, complete, and delete cobra commands end-to-end using t.TempDir for file isolation"
            - "BenchmarkLoad1000 loads a JSON file containing 1000 tasks in under 10ms per operation"
            - "BenchmarkSave1000 writes a JSON file containing 1000 tasks in under 10ms per operation"
            - "Test line coverage is at or above 80 percent measured with go test -covermode=atomic"
            - "All unit and integration tests pass with go test ./..."
            - "No test uses a shared global store path — each test uses an independent temp directory"
            - "Sub-tests use t.Parallel to maximize CI parallelism"
          priority: "must"

    - title: "Task Discovery and Filtering"
      description: "Features that help users surface the tasks most relevant to them: filtering by priority level, searching by keyword across title and description, viewing only incomplete tasks by default, and sorting the list by due date or priority."
      stories:
        - key: "2-1"
          title: "Default incomplete view and show-all flag"
          description: "Modify the list command to show only incomplete tasks by default. Add a --all flag that when provided includes completed tasks in the output. The filtering is applied in memory after loading the full task list from the store, before any other filtering or sorting."
          acceptance_criteria:
            - "Running list without flags shows only incomplete tasks"
            - "Running list with --all shows both complete and incomplete tasks"
            - "Completed tasks are excluded from the default list output even when they exist in the store"
            - "The --all flag description appears in the list command help text"
            - "Integration tests verify both the default incomplete behavior and the --all override with a mix of task states"
          priority: "should"

        - key: "2-2"
          title: "Priority filtering on the list command"
          description: "Add a --priority flag to the list command that accepts high, medium, or low (case-insensitive) and limits displayed tasks to those matching the specified priority. The flag is optional; omitting it shows tasks of all priorities subject to other active filters. Reuses the existing ValidatePriority function for validation."
          acceptance_criteria:
            - "Running list --priority high shows only high-priority tasks"
            - "Running list --priority medium shows only medium-priority tasks"
            - "Running list --priority low shows only low-priority tasks"
            - "Providing an invalid value to --priority returns a user error message and exits with code 1"
            - "Omitting --priority shows tasks of all priority levels"
            - "Priority filtering composes with --all so list --priority high --all shows all high-priority tasks including completed ones"
            - "Unit tests cover each valid priority, an invalid value, and empty result sets"
          priority: "must"

        - key: "2-3"
          title: "Keyword search across title and description"
          description: "Add a --search flag to the list command that accepts a keyword string and filters displayed tasks to those whose title or description contains the keyword using case-insensitive substring matching. No index or external library is needed. The search filter composes with --priority and --all."
          acceptance_criteria:
            - "Running list --search with a keyword shows only tasks whose title or description contains the keyword"
            - "Keyword matching is case-insensitive"
            - "Running list --search with a keyword that matches no tasks shows only the header row without an error"
            - "Search applies to the description field even when some tasks have an empty description"
            - "The --search flag composes with --priority and --all flags"
            - "Unit tests cover title match, description match, case-insensitive match, no match, and combined filter scenarios"
          priority: "must"

        - key: "2-4"
          title: "Sort list by due date or priority"
          description: "Add a --sort flag to the list command accepting due or priority as sort keys. When --sort due is specified, tasks are ordered by due date ascending with tasks missing a due date appearing last. When --sort priority is specified, tasks are ordered high then medium then low. Without --sort the default order is insertion order. Sorting is applied after all filtering."
          acceptance_criteria:
            - "Running list --sort due orders tasks by due date ascending"
            - "Tasks with no due date appear at the end of the list when sorting by due date"
            - "Running list --sort priority orders tasks with high priority first, then medium, then low"
            - "Providing an unrecognized sort key returns a user error and exits with code 1"
            - "Omitting --sort preserves the original insertion order from the JSON file"
            - "The --sort flag composes with --priority, --search, and --all flags"
            - "Unit tests cover both sort keys, mixed due-date presence, composability with filters, and an invalid key"
          priority: "could"

    - title: "Task Editing and Housekeeping"
      description: "Lifecycle management for tasks over time: users can update any field on an existing task and clean up their list by archiving or bulk-deleting completed tasks, keeping the active list focused."
      stories:
        - key: "3-1"
          title: "Update task command"
          description: "Implement cmd/update.go as NewUpdateCmd(store Store) accepting a task ID as a positional argument plus optional flags --title, --description, --priority, and --due. Only flags explicitly provided on the command line overwrite their corresponding fields; omitted flags leave existing values unchanged. Follow the read-validate-mutate-save pattern: load tasks, find by ID returning ErrTaskNotFound if missing, validate provided values using existing validators, apply only provided changes, then save."
          acceptance_criteria:
            - "Running update with a valid ID and --title changes only the title and leaves all other fields unchanged"
            - "Running update with multiple flags changes all specified fields simultaneously"
            - "Fields not provided on the command line retain their original values after the update"
            - "Running update with an unknown task ID exits with code 1 and prints an error to stderr"
            - "Running update with no field flags prints a usage error and exits with code 1"
            - "Updated values are validated using the same validators as the add command"
            - "A single confirmation line is printed to stdout after a successful update"
            - "Unit tests cover single-field update, multi-field update, no-flag error, not-found error, and validation failure"
          priority: "should"

        - key: "3-2"
          title: "Bulk-delete completed tasks"
          description: "Implement cmd/clean.go as NewCleanCmd(store Store) that removes all tasks where completed is true from the store in a single atomic operation. Add an optional --dry-run flag that prints the IDs and titles of tasks that would be removed without modifying the store. Print the count of removed tasks to stdout on a real run."
          acceptance_criteria:
            - "Running clean removes all completed tasks from the store and prints the count removed to stdout"
            - "Running clean when there are no completed tasks exits cleanly with a message indicating nothing was removed"
            - "Running clean with --dry-run lists the IDs and titles of tasks that would be removed without modifying the store"
            - "After running clean, a subsequent list command with --all shows no completed tasks"
            - "Clean uses the atomic write pattern so a crash during the operation does not corrupt the store"
            - "Unit tests cover a mix of complete and incomplete tasks, an empty completed set, and the dry-run mode"
          priority: "could"

    - title: "Binary Distribution and Installation"
      description: "Packaging and release of the tool as a single self-contained static binary for macOS and Linux, enabling users to install and run the CLI without any package manager, runtime dependency, or network account."
      stories:
        - key: "4-1"
          title: "Makefile and cross-compilation build system"
          description: "Create a Makefile with targets for building fully static binaries for darwin/amd64, darwin/arm64, linux/amd64, and linux/arm64 using CGO_ENABLED=0. Each build target must inject Version from git describe, Commit from the short git SHA, and BuildDate from the current date via ldflags. Add a make test target that runs go test ./... and a make checksums target that generates SHA-256 checksum files alongside each binary. Add a size-check step that fails loudly if any binary exceeds 20MB."
          acceptance_criteria:
            - "A single make build command produces binaries for all four target platforms"
            - "All produced binaries are fully statically linked with CGO_ENABLED=0"
            - "Running the produced binary with the version subcommand shows Version, Commit, and BuildDate injected at link time"
            - "Running make test executes go test for all packages and reports pass or failure"
            - "Running make checksums generates SHA-256 checksum files alongside each platform binary"
            - "The build step fails with a clear error if any binary exceeds 20MB"
          priority: "must"

        - key: "4-2"
          title: "GitHub Actions release workflow"
          description: "Create a GitHub Actions workflow at .github/workflows/release.yml that triggers on version tag pushes matching the v-star pattern. The workflow must run the full test suite, then build the cross-platform binaries using the Makefile, generate checksums, and upload all binaries and checksum files as GitHub Release assets. The release is gated on passing tests — a test failure must prevent the release from being published."
          acceptance_criteria:
            - "The workflow file exists at .github/workflows/release.yml and is valid YAML"
            - "The workflow triggers on push events matching version tag patterns starting with v"
            - "The workflow runs the full test suite before building release binaries"
            - "A test failure prevents the workflow from publishing a release"
            - "The workflow builds binaries for all four supported platforms using CGO_ENABLED=0"
            - "The workflow uploads one binary and one SHA-256 checksum file per platform as GitHub Release assets"
          priority: "must"
  ```

