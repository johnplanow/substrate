output: |
  ```yaml
  result: success
  problem_statement: "Developers who work primarily in terminal environments face a persistent context-switching tax when managing tasks: mainstream task managers (Todoist, Notion, Things) demand leaving the terminal to interact with a GUI or browser tab, fragmenting focus and disrupting flow state during deep work sessions. Lightweight workarounds—plain text files, ad-hoc notes, shell aliases—lack queryable structure, making filtering by urgency or searching by keyword impractical without custom scripting. The consequence is a forced choice between adopting heavyweight, context-disruptive tools or abandoning structured task tracking altogether, which increases cognitive load, causes missed deadlines, and leaves developers maintaining mental overhead that a purpose-built tool should absorb."
  target_users:
    - "Terminal-first software engineers (vim/neovim/emacs users, remote SSH workers, Linux and macOS CLI-centric developers) who manage personal or project tasks and resent breaking keyboard flow to reach a GUI application or browser tab for something as simple as marking a task done."
    - "DevOps engineers and SREs who track operational work—deployment steps, incident follow-ups, infrastructure checklists—from the command line and need a structured, filterable task list that lives where they already work, without requiring a network connection or account creation."
    - "Independent developers and open-source contributors who self-manage feature backlogs and bug queues across multiple local projects and want a single lightweight binary they can install once and use everywhere, with data stored locally so it travels with their dotfiles and works offline unconditionally."
  ```


