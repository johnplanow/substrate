  ```yaml
  result: success
  core_features:
    - "Add tasks with a title, priority level (high/medium/low), and optional due date via a single CLI command"
    - "List all tasks in a readable terminal-formatted output showing title, priority, due date, and completion status"
    - "Mark one or more tasks as complete by task ID"
    - "Delete tasks by task ID"
    - "Filter task listing by priority level (high, medium, low) to surface what matters most"
    - "Search tasks by keyword across title and description fields"
    - "Persist all task data to a local JSON file with no server or network dependency"
    - "Distribute as a single self-contained binary requiring no external runtime installation beyond the language runtime"
  success_metrics:
    - "Time from install to first task added is under 60 seconds for a new user with no prior documentation"
    - "CLI command response time under 100ms for list, add, complete, and delete operations on up to 1000 tasks"
    - "Weekly active usage rate above 50% among users who added at least 3 tasks in their first session within 14 days of install"
    - "Task completion rate (tasks marked done vs tasks added) above 40% across active users over a 30-day window"
    - "Zero-dependency install succeeds on macOS and Linux without any additional package manager steps in >95% of documented test environments"
    - "Binary size under 20MB to reduce friction for users who distribute it via dotfiles or remote SSH environments"
  constraints:
    - "CLI-only interface limits audience to users comfortable with terminal workflows — no GUI or web fallback"
    - "Local-only storage means no sync across machines without manual file copying or dotfile management by the user"
    - "No account or cloud backend means no built-in collaboration or sharing features"
    - "Must function fully offline with zero network calls at runtime"
    - "Must support macOS and Linux as primary platforms given the target user profile"
  technology_constraints:
    - "Data must be stored locally in a JSON file — no database server or cloud storage"
    - "Must ship as a single binary with no dependencies beyond the language runtime"
    - "No server component of any kind — fully client-side, local execution only"
