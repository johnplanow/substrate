name: analysis-bad-cli-task-tracker
description: Subtle-bad analysis — structure-matched, plausible-sounding, fails all four rubric dimensions
phase: analysis
notes: |
  G8.a-part-2 subtle bad variant (2026-04-11). Structurally identical to analysis/good.yaml
  (same two YAML code-fenced blocks, same step boundary, same top-level field names). The
  degradation is semantic: content fails specific rubric dimensions while looking superficially
  plausible. Calibration criterion — once META_EVAL=1 is run with a real grader, this variant
  should show a smaller margin than the pre-G8.a cartoonish-bad would have (whose structural
  mismatch trivially discriminated). Per-dimension degradation:

  - problem_clarity: narrative uses abstract productivity language ("context-switching tax",
    "flow state") but names no concrete mechanism, no specific tools, no measurable impact,
    no counted population. The judge can notice the absence of grounded evidence.
  - user_specificity: target users are generic roles ("developers", "knowledge workers",
    "technology professionals") rather than named segments with concrete workflows and
    tool lists.
  - feature_justification: core_features are kitchen-sink (AI, cloud sync, mobile apps,
    team collaboration) that contradict the terminal-first, local-only, single-binary
    framing. None trace back to the stated problem.
  - scope_discipline (G13-rewritten): constraints are aspirations ("should be fast", "must
    be reliable") with no hard limits that bound the solution space.

  Length target: within ±20% of good.yaml. Structural asymmetry between good and bad (step
  count, step names, YAML code-fence presence) is deliberately eliminated so the judge is
  forced to discriminate on content.
output: |
  ```yaml
  result: success
  problem_statement: "Developers and technology professionals encounter friction in their daily task management workflows, where existing tools impose a context-switching tax that disrupts productive focus and flow state during knowledge work. Current task tracking solutions don't always fit the way developers actually work, creating opportunities for a better approach that integrates more smoothly with existing workflows and eliminates unnecessary overhead. There's meaningful room for improvement in how technical professionals capture, organize, and complete their work, and a thoughtfully designed tool could reduce cognitive load and improve long-term productivity across the broader developer community."
  target_users:
    - "Developers and software engineers who want a better way to manage their daily work and feel that current task tracking tools fall short of their needs."
    - "Knowledge workers and technology professionals who juggle many concerns across their projects and would benefit from a modern workflow tool that fits naturally into their existing habits."
    - "Technical professionals and engineering team members who care about productivity and want a streamlined solution for tracking their work across multiple initiatives and commitments."
  ```


