dimensions:
  - name: architecture_rationale
    weight: 0.3
    prompt: "Does each architecture decision include a rationale, not just a value?"
  - name: story_decomposition
    weight: 0.3
    prompt: "Does each story include both an explicit acceptance-criteria list and a reference to at least one named module, file, or interface it touches?"
  - name: fr_coverage
    weight: 0.2
    prompt: "Do the stories collectively cover all functional requirements from the PRD?"
  - name: dependency_ordering
    weight: 0.2
    prompt: "Are story dependencies and ordering logical — no forward references?"
